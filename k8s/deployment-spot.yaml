apiVersion: apps/v1
kind: Deployment
metadata:
  name: resilient-inference-server-spot
  labels:
    app: resilient-inference-server
    node-pool: spot
spec:
  replicas: 1
  selector:
    matchLabels:
      app: resilient-inference-server
      node-pool: spot
  template:
    metadata:
      labels:
        app: resilient-inference-server
        node-pool: spot
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8000"
        prometheus.io/path: "/metrics"
    spec:
      nodeSelector:
        cloud.google.com/gke-spot: "true"
      tolerations:
        - key: cloud.google.com/gke-spot
          operator: Equal
          value: "true"
          effect: NoSchedule
        - key: nvidia.com/gpu
          operator: Exists
          effect: NoSchedule
      # GKE Spot preemption window (see docs/architecture.md, Reliability):
      #   ~30 seconds total — ~15s for the workload pod and ~15s reserved for
      #   critical system pods. Drain logic must finish inside this budget.
      terminationGracePeriodSeconds: 25
      containers:
        - name: inference-server
          image: resilient-inference-server:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8000
          env:
            - name: HF_HOME
              value: /app/.cache/huggingface
            # Comma-separated peer base URLs for queue migration during drain.
            # Example: http://resilient-inference-server/resilient-inference-server-ondemand:80
            - name: PEER_URLS
              value: "http://resilient-inference-server-ondemand"
            # Demo locally without GCE metadata (unset in production):
            # - name: SIMULATE_PREEMPTION_AFTER_SECONDS
            #   value: "120"
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 20
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 30
            periodSeconds: 20
          lifecycle:
            preStop:
              exec:
                command:
                  - /bin/sh
                  - -c
                  - |
                    # Phase 6: trigger the same drain path as GCE Spot preemption / SIGTERM.
                    # Blocks until DRAINED so in-flight work completes and queued requests migrate.
                    curl -sf -X POST http://127.0.0.1:8000/internal/drain
          resources:
            requests:
              cpu: 500m
              memory: 1Gi
            limits:
              cpu: "2"
              memory: 2Gi
