apiVersion: v1
kind: Service
metadata:
  name: resilient-inference-server-ondemand
  labels:
    app: resilient-inference-server
    node-pool: ondemand
spec:
  type: ClusterIP
  selector:
    app: resilient-inference-server
    node-pool: ondemand
  ports:
    - name: http
      port: 80
      targetPort: http
      protocol: TCP
