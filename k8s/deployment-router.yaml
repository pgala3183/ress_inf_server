apiVersion: apps/v1
kind: Deployment
metadata:
  name: resilient-inference-router
  labels:
    app: resilient-inference-router
spec:
  replicas: 1
  selector:
    matchLabels:
      app: resilient-inference-router
  template:
    metadata:
      labels:
        app: resilient-inference-router
    spec:
      containers:
        - name: router
          image: resilient-inference-server:latest
          imagePullPolicy: IfNotPresent
          command: ["python", "-m", "server.main", "--router"]
          ports:
            - name: http
              containerPort: 8000
          env:
            - name: SPOT_SERVICE_URL
              value: "http://resilient-inference-server-spot"
            - name: ONDEMAND_SERVICE_URL
              value: "http://resilient-inference-server-ondemand"
            - name: QUEUE_PRESSURE_THRESHOLD
              value: "5"
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 10
            periodSeconds: 20
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: 200m
              memory: 256Mi
